name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key:
            ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
            '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Configure API keys
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY || 'test' }}" >> local.properties
          echo "RABBITSTREAM_SOURCE_API=${{ secrets.RABBITSTREAM_SOURCE_API || 'test' }}" >> local.properties
          echo "SUBDL_API_KEY=test" >> local.properties

      # ── Full APK ──
      - name: Build full APK
        continue-on-error: true
        run: |
          echo "APP_LAYOUT=full" >> local.properties
          ./gradlew assembleDebug --stacktrace

      - name: Rename full APK
        run: |
          apk=$(find app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$apk" ]; then cp "$apk" streamflix-full-debug.apk; fi
          echo "APK source: ${apk:-none}"

      # ── Mobile APK ──
      - name: Build mobile APK
        continue-on-error: true
        run: |
          echo "APP_LAYOUT=mobile" >> local.properties
          ./gradlew assembleDebug --stacktrace

      - name: Rename mobile APK
        run: |
          apk=$(find app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$apk" ]; then cp "$apk" streamflix-mobile-debug.apk; fi
          echo "APK source: ${apk:-none}"

      # ── TV APK ──
      - name: Build TV APK
        continue-on-error: true
        run: |
          echo "APP_LAYOUT=tv" >> local.properties
          ./gradlew assembleDebug --stacktrace

      - name: Rename TV APK
        run: |
          apk=$(find app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$apk" ]; then cp "$apk" streamflix-tv-debug.apk; fi
          echo "APK source: ${apk:-none}"

      # ── Release ──
      - name: Create Release
        if:
          ${{ github.event_name == 'push' && startsWith(github.ref,
          'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Streamflix ${{ github.ref_name }}

            Download the APK matching your device:

            | File | Description |
            |------|-------------|
            | `streamflix-full-debug.apk` | All layouts (recommended) |
            | `streamflix-mobile-debug.apk` | Mobile-only |
            | `streamflix-tv-debug.apk` | TV (Leanback) |

            **Note**: Debug APKs are unsigned. Enable "Install from unknown sources" on your device.
          files: |
            streamflix-full-debug.apk
            streamflix-mobile-debug.apk
            streamflix-tv-debug.apk
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
