name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layout: [full, mobile, tv]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key:
            ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
            '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Configure API keys
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY || 'test' }}" >> local.properties
          echo "RABBITSTREAM_SOURCE_API=${{ secrets.RABBITSTREAM_SOURCE_API || 'test' }}" >> local.properties
          echo "SUBDL_API_KEY=test" >> local.properties

      - name: Build ${{ matrix.layout }} APK
        run: |
          echo "APP_LAYOUT=${{ matrix.layout }}" >> local.properties
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/streamflix-debug.apk \
             streamflix-${{ matrix.layout }}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-${{ matrix.layout }}-debug
          path: streamflix-${{ matrix.layout }}-debug.apk
          retention-days: 90

  release:
    name: Create Release
    if:
      ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          pattern: streamflix-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Streamflix ${{ github.ref_name }}

            Download the APK matching your device:

            | File | Description |
            |------|-------------|
            | `streamflix-full-debug.apk` | All layouts (recommended) |
            | `streamflix-mobile-debug.apk` | Mobile-only |
            | `streamflix-tv-debug.apk` | TV (Leanback) |

            **Note**: Debug APKs are unsigned. Enable "Install from unknown sources" on your device.
          files: |
            streamflix-full-debug.apk
            streamflix-mobile-debug.apk
            streamflix-tv-debug.apk
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
