name: Build & Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"

      - name: Access Secrets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RABBITSTREAM_SOURCE_API: ${{ secrets.RABBITSTREAM_SOURCE_API }}
        run: |
          echo TMDB_API_KEY=$TMDB_API_KEY >> local.properties
          echo RABBITSTREAM_SOURCE_API=$RABBITSTREAM_SOURCE_API >> local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Pre-clean
        run: rm -f app/build/outputs/apk/release/*.apk

      - name: Build Default APK (TV)
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Default APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Save signed APK
        run: |
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" /tmp/app-release-default.apk

      - name: Build Mobile-Only APK
        run: |
          echo APP_LAYOUT=mobile >> local.properties
          ./gradlew assembleRelease --stacktrace

      - name: Sign Mobile-Only APK
        id: sign_apk_mobile
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Save mobile signed APK
        run: |
          cp "${{ steps.sign_apk_mobile.outputs.signedReleaseFile }}" /tmp/app-release-mobile.apk

      - name: Build TV-Only APK
        run: |
          echo APP_LAYOUT=tv >> local.properties
          ./gradlew assembleRelease --stacktrace

      - name: Sign TV-Only APK
        id: sign_apk_tv
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Save TV signed APK
        run: |
          cp "${{ steps.sign_apk_tv.outputs.signedReleaseFile }}" /tmp/app-release-tv.apk

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          BASE="${{ github.event.repository.name }}-${{ github.ref_name }}"
          mkdir -p /tmp/assets
          cp /tmp/app-release-default.apk "/tmp/assets/$BASE.apk"
          cp /tmp/app-release-mobile.apk "/tmp/assets/$BASE-only-mobile.apk"
          cp /tmp/app-release-tv.apk "/tmp/assets/$BASE-only-tv.apk"
          gh release create "$RELEASE_TAG" \
            --title "Release $RELEASE_TAG" \
            --notes "Automated release for $RELEASE_TAG" \
            /tmp/assets/*
